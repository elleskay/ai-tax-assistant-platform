# Fly.io deployment template for the RAG microservice.
# Rename `app` to your real Fly app name, then `fly deploy`.
#
# Secrets (set with `fly secrets set ...`, NOT here):
#   OPENAI_API_KEY  — required for real embeddings
#   DATABASE_URL    — Neon Postgres connection string with pgvector enabled
#
# Leaving DATABASE_URL unset makes the service use the local file store, which
# is NOT durable on Fly (the filesystem is ephemeral) — set it for any real use.

app = "iras-rag"
primary_region = "sin"   # Singapore — closest to IRAS users

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # text-embedding-3-small dimensions; keep in sync with the model.
  RAG_EMBED_DIM = "1536"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on warm instance: never scale to zero, keep exactly one machine.
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
