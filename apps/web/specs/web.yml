app: web
version: 1
requirements:
  - id: TAX-TAX-001
    title: Chargeable income is gross income minus deductions, floored at zero
    category: data
    severity: high
    given: A gross income and a deductions figure in SGD
    when: calculateChargeableIncome(income, deductions) is called
    then: It returns max(0, income - deductions), never negative
    tags: [tax, estimate]

  - id: TAX-TAX-002
    title: Tax lookup returns the known fact for a supported topic
    category: data
    severity: high
    given: A topic string such as GST, income tax, corporate tax, or SRS
    when: lookupTaxFact(topic) is called
    then: It returns the matching fact for known topics and a guidance fallback listing available topics for unknown ones
    tags: [tax, lookup]

  - id: TAX-HITL-001
    title: Escalation store supports create, list, and resolve
    category: data
    severity: high
    given: An empty escalation queue
    when: addEscalation is called, then listEscalations, then resolveEscalation on the new id
    then: The entry is created as pending, listed, and then marked resolved
    tags: [hitl, store]

  - id: TAX-CHAT-001
    title: Home page renders the chat interface
    category: ui
    severity: critical
    given: A visitor opens the home page
    when: The page loads
    then: It shows a single h1, a message input, and a send button
    tags: [chat, ui]

  - id: TAX-CHAT-002
    title: Sending a message shows the user message and the assistant reply
    category: functional
    severity: critical
    given: The chat page is open and the chat API is reachable
    when: The user types a question and submits it
    then: The user message appears, followed by the assistant reply text
    tags: [chat]
    notes: The LLM is non-deterministic, so the e2e stubs /api/chat with a fixed UI message stream and asserts against the fixture.

  - id: TAX-LANDING-001
    title: Landing page guides the visitor and links into every showcase page
    category: ui
    severity: medium
    given: A visitor opens the home page
    when: The page loads
    then: It shows the hero and links into every showcase page (Assistant, Documents, AI Tools, AI Instructions, Usage analytics, AI Gateway, AI Dashboard, AI Policy, AI Audit Trail, AI Evaluation)
    tags: [landing, guide]

  - id: TAX-CHAT-004
    title: New chat clears the conversation and history keeps the previous one
    category: functional
    severity: medium
    given: The assistant has a conversation with at least one message
    when: The visitor clicks New chat
    then: The conversation returns to the empty state and the previous one is listed in history
    tags: [chat, history]
    notes: The chat e2e stubs /api/chat.

  - id: TAX-CHAT-005
    title: A question deep link asks it automatically
    category: functional
    severity: medium
    given: The assistant is opened with a question in the URL
    when: The page loads at /assistant with a q query parameter
    then: The question is sent and appears as a user message
    tags: [chat, landing]
    notes: The chat e2e stubs /api/chat.

  - id: TAX-CHAT-003
    title: A general-information disclaimer is always visible on the chat page
    category: ui
    severity: high
    given: The chat page is open
    when: The page loads
    then: A disclaimer states this is general information, not personalised tax advice
    tags: [chat, compliance]

  - id: TAX-HITL-002
    title: Admin page lists pending escalations from the queue
    category: functional
    severity: high
    given: At least one pending escalation exists in the queue
    when: An advisor opens the admin page
    then: The pending escalation is listed with its reason and original query
    tags: [hitl, admin]

  - id: TAX-HITL-003
    title: Resolving an escalation marks it resolved end to end
    category: functional
    severity: high
    given: A pending escalation has been created via the escalation API
    when: The advisor opens the admin page and clicks Resolve on that escalation
    then: The escalation is shown as resolved after the action
    tags: [hitl, admin, journey]
    depends_on: [TAX-HITL-002]

  - id: TAX-A11Y-001
    title: Page exposes a skip-to-content link and a single h1
    category: a11y
    severity: high
    given: A keyboard user lands on the chat page
    when: They inspect the landmark structure
    then: A skip-to-content link targets the main region and exactly one h1 is present
    tags: [a11y]

  - id: TAX-A11Y-002
    title: The chat message input has an accessible label
    category: a11y
    severity: high
    given: A screen reader user focuses the chat input
    when: The accessible name is computed
    then: The input exposes a non-empty accessible label
    tags: [a11y, forms]

  - id: TAX-SEC-001
    title: Responses carry baseline security headers
    category: security
    severity: high
    given: Any page is requested over HTTP
    when: The response headers are inspected
    then: X-Frame-Options is DENY and X-Content-Type-Options is nosniff
    tags: [security, headers]

  - id: TAX-NAV-001
    title: Primary navigation links to every showcase page
    category: functional
    severity: high
    given: A visitor is anywhere on the site
    when: They look at the primary navigation
    then: There are links to Assistant, MCP tools, Evals, Gateway, Prompts, and the Advisor queue
    tags: [nav, showcase]

  - id: TAX-TOOLS-002
    title: A visitor can run a seeded lookup tool and see a result
    category: functional
    severity: high
    given: The Tools page is open with the seeded tax_facts lookup under Your tools
    when: The visitor runs it with a topic of GST
    then: The deterministic tax fact for GST is shown, including the SGD 1,000,000 threshold
    tags: [tools, examples]

  - id: TAX-EVAL-001
    title: Evals page shows the test-cases workbench
    category: ui
    severity: medium
    given: A visitor opens the Evals page
    when: The page loads
    then: It shows the Test cases section and the Results section
    tags: [evals, workbench]

  - id: TAX-ROUTE-001
    title: Routing page shows the editable model routing rules
    category: ui
    severity: medium
    given: A visitor opens the Routing page
    when: The page loads
    then: It shows the Model routing rules section and the live route preview
    tags: [routing, workbench]

  - id: TAX-TOOLS-003
    title: A visitor can create a custom tool and run it
    category: functional
    severity: high
    given: The Tools page is open
    when: The visitor builds a lookup tool with a keyword-to-answer pair and runs it
    then: The tool is created and returns the configured answer for that keyword
    tags: [tools, builder]

  - id: TAX-ROUTER-001
    title: The deterministic routing rules pick the right model per query
    category: data
    severity: high
    given: The default routing config and queries with factual, personalised, PII, or no signal
    when: applyRoutingRules is called
    then: Factual lookups route to the OpenAI model, personalised and PII to Anthropic, others to the fallback, with the right reason
    tags: [evals, router]

  - id: TAX-EVAL-002
    title: The route preview shows where a query routes
    category: functional
    severity: medium
    given: The Routing page is open
    when: The visitor types a factual query into the route preview
    then: It shows the query routing to the configured factual-lookup model
    tags: [routing, router]

  - id: TAX-EVAL-003
    title: Running the test cases populates the result stats
    category: functional
    severity: medium
    given: The Evals page is open and the eval API is reachable
    when: The visitor clicks Run
    then: The result stats populate with an overall pass rate
    tags: [evals, workbench]
    notes: Running calls the routed model per case, so the e2e stubs /api/eval with a fixed result.

  - id: TAX-RATELIMIT-001
    title: Rate limiting fails open when Upstash is not configured
    category: data
    severity: high
    given: No UPSTASH_REDIS_REST_URL or token is set (local dev, smoke tests)
    when: makeLimiter is called and isAllowed is awaited
    then: makeLimiter returns null and isAllowed resolves true, so requests are allowed
    tags: [rate-limit, infra]

  - id: TAX-STORE-001
    title: Generic JSON store round-trips values and lists newest-first
    category: data
    severity: high
    given: A store created with createJsonStore in file mode
    when: Values are put, fetched, and listed
    then: get returns what was put, list returns values newest-first (reverse-chronological ids sort ascending), and reverseChronoId of a later time sorts before an earlier one
    tags: [store, infra]

  - id: TAX-GATEWAY-001
    title: The gateway records model, latency, and token usage for a completed call
    category: data
    severity: high
    given: A model call routed through gatewayModel (mock model, no network)
    when: The call completes
    then: A gateway log entry exists with the model id, a non-negative latency, and the input and output token counts from the provider usage
    tags: [gateway, observability]

  - id: TAX-GATEWAY-002
    title: Gateway cost is computed from the registry prices for generate and stream
    category: data
    severity: high
    given: A registry entry with known per-1M-token prices and a call with known usage
    when: The call completes via the generate path and via the stream path
    then: The logged costUsd equals tokens divided by 1M times the registry price, summed over input and output
    tags: [gateway, cost]

  - id: TAX-GATEWAY-003
    title: A provider error falls back to the alternate provider and is flagged
    category: data
    severity: high
    given: A primary model whose call throws and a fallback model that succeeds
    when: The call is made through the gateway
    then: The fallback model answers, and the log entry records the fallback model id with fallbackUsed true
    tags: [gateway, resilience]

  - id: TAX-GATEWAY-004
    title: The gateway page lists recent model calls
    category: ui
    severity: medium
    given: Gateway log entries exist in the store
    when: A visitor opens the gateway page
    then: Recent calls are listed with model, tokens, latency, and cost
    tags: [gateway, observability]

  - id: TAX-EVAL-004
    title: Eval runs persist and list newest-first
    category: data
    severity: high
    given: Completed eval runs with stats
    when: They are saved through the eval-run store and listed
    then: Runs round-trip with their stats, listing returns newest first, and a limit caps the result
    tags: [evals, store]

  - id: TAX-EVAL-005
    title: The LLM judge grades to a structured verdict and fails closed
    category: data
    severity: high
    given: A judge model that returns either a valid JSON verdict or unparseable output (mock model, no network)
    when: judgeGrade is called with a question, answer, and rubric
    then: A valid verdict yields pass, score, and rationale; unparseable output fails closed with pass false and score 0 instead of throwing
    tags: [evals, judge]

  - id: TAX-EVAL-006
    title: Run history shows past runs with a pass-rate trend
    category: functional
    severity: medium
    given: The evals page is open and the per-case eval API is stubbed
    when: The visitor runs the test cases
    then: The completed run is persisted through the runs API and appears in the run history with a pass-rate trend bar
    tags: [evals, history]
    notes: /api/eval is stubbed (it calls the LLM); /api/eval/runs is exercised for real against the file-backed store.

  - id: TAX-EVAL-007
    title: Baseline comparison flags regressions beyond the tolerance
    category: data
    severity: high
    given: A run pass rate, a committed baseline pass rate, and a tolerance
    when: compareToBaseline is called
    then: It reports a regression only when the rate is more than the tolerance below the baseline, with the delta; the eval CLI exits non-zero on regression
    tags: [evals, baseline, ci]
    notes: The CLI's live-model path runs in CI when ANTHROPIC_API_KEY is present and skips cleanly otherwise.

  - id: TAX-EVAL-008
    title: A persisted run records the prompt version and grader it targeted
    category: data
    severity: medium
    given: An eval run executed with a chosen grader against a chosen prompt version
    when: The run is persisted and listed
    then: The run entry carries the grader and promptVersion it was executed with
    tags: [evals, prompts]

  - id: TAX-PROMPT-001
    title: Prompt store keeps immutable versions behind an activation pointer
    category: data
    severity: high
    given: A prompt with an existing version
    when: A new version is added and later activated
    then: Versions are append-only with increasing numbers, earlier content is unchanged, and activeVersion moves only when a version is explicitly activated (activating a missing version fails)
    tags: [prompts, store]

  - id: TAX-PROMPT-002
    title: The system prompt resolves from the active version and falls back to the compiled-in default
    category: data
    severity: high
    given: The prompt store may be empty, unreadable, or hold an active version
    when: resolveSystemPrompt() is called
    then: It returns the active version's content when one exists and the compiled-in SYSTEM prompt otherwise, never throwing
    tags: [prompts, agent]

  - id: TAX-PROMPT-003
    title: The prompts page lists versions and shows a line diff between them
    category: ui
    severity: medium
    given: A prompt with at least two versions exists in the store
    when: A visitor opens the prompts page and selects a later version
    then: The versions are listed with the active one marked, and a line diff against the previous version highlights added and removed lines
    tags: [prompts, ui]

  - id: TAX-PROMPT-004
    title: Creating and activating a prompt version works end to end
    category: functional
    severity: high
    given: The prompts page is open
    when: The visitor saves a new version through the form and activates it
    then: The new version appears in the list and is marked active after activation
    tags: [prompts, journey]
    depends_on: [TAX-PROMPT-001]
    notes: Real API, no LLM involved. The journey covers create, activate, and read-back in one pass.

  - id: TAX-PROMPT-005
    title: The prompts write API validates input and is rate limited
    category: security
    severity: high
    given: The prompts API is reachable
    when: A write request carries an invalid name, empty content, or an unknown version activation
    then: The API rejects it with 400 (404 for unknown activation targets) and never persists the payload; writes share the rate limiter, which fails open only when Upstash is not configured
    tags: [prompts, security]

  - id: TAX-SANDBOX-001
    title: Sandboxed code tools run user JavaScript and return a JSON result
    category: data
    severity: high
    given: A code custom tool whose run(input) returns a JSON-serializable value
    when: runSandboxed executes it with an input object
    then: It returns ok true with the function's result, parsed from JSON, and a duration
    tags: [sandbox, tools]

  - id: TAX-SANDBOX-002
    title: Runaway sandbox code is interrupted by hard time and memory limits
    category: security
    severity: critical
    given: Code containing an infinite loop or an unbounded allocation
    when: runSandboxed executes it
    then: The infinite loop is interrupted at the deadline (about one second) and the allocation bomb fails at the memory cap (about 32MB); both return ok false with a safe error message instead of hanging or crashing the process
    tags: [sandbox, security]

  - id: TAX-SANDBOX-003
    title: The sandbox exposes no host capabilities
    category: security
    severity: critical
    given: Code that probes for fetch, require, process, fs, or other host globals
    when: runSandboxed executes it
    then: None of the host capabilities exist inside the sandbox; the probes find no escape surface
    tags: [sandbox, security]

  - id: TAX-SANDBOX-004
    title: Sandbox output is capped with a truncation marker
    category: data
    severity: medium
    given: Code whose result serializes larger than the output cap (about 8KB)
    when: runSandboxed executes it
    then: The returned result is truncated to the cap and carries a truncation marker
    tags: [sandbox, limits]

  - id: TAX-TOOLS-005
    title: A visitor can build a sandboxed code tool and run it end to end
    category: functional
    severity: high
    given: The Tools page is open
    when: The visitor creates a code tool with a run(input) function and runs it with an input
    then: The tool executes server-side in the sandbox and the computed result is shown
    tags: [tools, sandbox, journey]
    depends_on: [TAX-SANDBOX-001]
    notes: Deterministic, no LLM. The run goes through POST /api/tools/run against the real sandbox.

  - id: TAX-MCP-001
    title: The MCP endpoint answers a JSON-RPC initialize
    category: functional
    severity: high
    given: The Streamable HTTP MCP endpoint at /api/mcp
    when: A client POSTs a JSON-RPC initialize request
    then: The response carries the server name and a protocol version
    tags: [mcp, server]
    notes: Streamable HTTP may frame single replies as SSE; the test parses both JSON and event-stream bodies.

  - id: TAX-MCP-002
    title: tools/list exposes the run_javascript sandbox tool with a schema
    category: functional
    severity: high
    given: The MCP endpoint is reachable
    when: A client requests tools/list
    then: run_javascript is listed with an input schema, and the removed built-in tax tools are not
    tags: [mcp, tools]

  - id: TAX-MCP-003
    title: Calling run_javascript over MCP executes code in the sandbox
    category: functional
    severity: high
    given: The MCP endpoint is reachable
    when: A client calls the run_javascript tool with a run(input) function via tools/call
    then: The tool result text includes the sandbox-computed value
    tags: [mcp, journey]
    notes: Full over-the-wire journey against the real endpoint and the QuickJS sandbox; no LLM involved.

  - id: TAX-MCP-004
    title: Escalation over MCP requires the API key when one is configured
    category: security
    severity: high
    given: MCP_API_KEY is set in the environment
    when: tools/call escalate_to_human arrives without (or with a wrong) bearer token
    then: The request is rejected with 401 before reaching the tool, using a constant-time comparison; with no MCP_API_KEY configured the tool stays open
    tags: [mcp, security]
    notes: Vitest with stubbed env against the route handler and the pure guard, no live server needed.

  - id: TAX-TOOLS-007
    title: Example tools are preloaded and runnable on first visit
    category: functional
    severity: high
    given: A first-time visitor with no saved custom tools
    when: They open the Tools page
    then: One example tool per kind (lookup, template, code) is listed, and running the example code tool returns its computed result from the server sandbox
    tags: [tools, examples, journey]
    notes: Deterministic, no LLM. The code example runs through POST /api/tools/run against the real sandbox. Examples behave like user tools (editable, deletable); any save replaces the seed.

  - id: TAX-CHAT-006
    title: Assistant example chips cover each scenario and stay available mid-chat
    category: ui
    severity: medium
    given: A visitor on the assistant page
    when: The empty state renders, and again after a conversation has started
    then: Example chips cover a factual lookup, a calculation, a multi-step two-tool question, a complex comparison, a personalised escalation, and a PII-sensitive question (with route hints in the empty state); during a conversation the chips remain above the composer so each scenario can be tried in the same chat
    tags: [chat, examples]

  - id: TAX-GUIDE-001
    title: Every feature page has a follow-along guide at the top
    category: ui
    severity: medium
    given: A first-time visitor opens any feature page (assistant, tools, evals, gateway, prompts, admin)
    when: The page loads
    then: A how-to-use panel near the top lists numbered follow-along steps for that page; collapsing it is remembered, so it stays collapsed on the next visit
    tags: [guide, docs]

  - id: TAX-EVAL-009
    title: A failed eval case explains why it failed
    category: functional
    severity: medium
    given: Eval results containing failed cases
    when: The results render after a run
    then: A keyword-graded failure lists the missed keywords, and a judge-graded failure shows the judge's score and rationale
    tags: [evals, workbench]
    notes: /api/eval is stubbed (it calls the LLM); the miss list and the judge verdict come from the stubbed responses.

  - id: TAX-AGENT-001
    title: The agent loop chains tools across steps until the answer
    category: data
    severity: high
    given: A compound question that needs a lookup and then a calculation
    when: The agent pipeline runs with a mock model that requests lookup_tax_info, then calculate_tax_estimate, then answers
    then: All three steps execute in order, each tool runs against the real deterministic implementation, and the final text is produced
    tags: [agent, loop]
    notes: Vitest with an ai/test MockLanguageModelV3 driving lib/run-agent.ts directly; zero network.

  - id: TAX-AGENT-002
    title: Assistant replies show a numbered step trace of tool use
    category: ui
    severity: medium
    given: An assistant reply that used tools
    when: The message renders
    then: A collapsed step trace is shown; expanding it lists each step numbered with the tool name, input, and output
    tags: [agent, trace]

  - id: TAX-AGENT-003
    title: A multi-step reply renders the full trace and the answer
    category: functional
    severity: high
    given: The assistant page with a stubbed /api/chat stream
    when: The stream carries two chained tool invocations and a final answer
    then: The reply shows the answer and a step trace with both tools in order, including their inputs and outputs
    tags: [agent, journey]
    notes: Stubbed UI message stream (no LLM); exercises the same client rendering path as a live multi-step run.
