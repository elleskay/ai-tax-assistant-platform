name: Eval gate

# Regression gate for prompt and agent changes: runs the committed eval suite
# (apps/web/evals/suite.json) with live model calls and fails the PR when the
# pass rate drops more than the tolerance below the committed baseline. Only
# triggers on paths that can change assistant behavior, and skips cleanly when
# ANTHROPIC_API_KEY is not configured (template forks, fork PRs).

on:
  pull_request:
    paths:
      - "apps/web/lib/agent.ts"
      - "apps/web/lib/tools.ts"
      - "apps/web/lib/tax.ts"
      - "apps/web/lib/prompt-store.ts"
      - "apps/web/lib/graders.ts"
      - "apps/web/lib/gateway.ts"
      - "apps/web/lib/model-registry.ts"
      - "apps/web/lib/model-router.ts"
      - "apps/web/evals/**"
      - "apps/web/scripts/run-eval.ts"

permissions:
  contents: read

concurrency:
  group: eval-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight (skip if not configured)
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Eval gate is configured. Proceeding."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret is not set. Skipping eval gate. This is normal for forks and PRs from forks."
          fi

  eval:
    name: Run eval suite against baseline
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run eval --workspace web
